<!DOCTYPE html>

<html lang="id"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>DAY BREAK Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style> *{ margin:0; padding:0; box-sizing:border-box; } body{ background:#111; color:#fff; font-family:'Space Mono', monospace; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:30px; } .container{ width:100%; max-width:700px; background:#1a1a1a; border:1px solid #333; padding:40px; border-radius:20px; } .logo{ text-align:center; margin-bottom:20px; } .logo h1{ font-size:64px; line-height:.9; margin-bottom:10px; } .logo p{ color:#bbb; font-size:14px; } .event-info{ text-align:center; margin-bottom:30px; } .event-info h2{ margin-bottom:10px; } .event-info p{ color:#ccc; line-height:1.8; } .quota-box{ margin-bottom:30px; } .quota-header{ display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; } .progress-bar{ width:100%; height:12px; background:#2a2a2a; border-radius:999px; overflow:hidden; } .progress-fill{ width:2%; height:100%; background:white; transition:.4s ease; } .quota-note{ margin-top:8px; font-size:12px; color:#999; } .form-group{ margin-bottom:20px; } label{ display:block; margin-bottom:8px; font-size:14px; } input, select, textarea{ width:100%; padding:14px; border:none; border-radius:10px; background:#2a2a2a; color:white; font-family:'Space Mono', monospace; } input:focus, select:focus, textarea:focus{ outline:2px solid white; } .checkbox-label{ display:flex; align-items:flex-start; gap:10px; font-size:13px; color:#ccc; } .checkbox-label input{ width:auto; margin-top:3px; } .btn{ width:100%; padding:16px; background:white; color:black; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px; transition:.3s; } .btn:hover{ transform:translateY(-2px); } .footer{ margin-top:20px; text-align:center; color:#999; font-size:12px; } .success-box{ text-align:center; padding:40px 10px; } .success-box h1{ font-size:60px; margin-bottom:20px; } .success-box h2{ margin-bottom:15px; } .success-box p{ color:#bbb; line-height:1.8; margin-bottom:20px; } .success-card{ background:#222; border:1px solid #333; border-radius:12px; padding:20px; } </style>

</head>

<body>

<div class="container">

<div class="logo">
    <h1>DAY<br>BREAK</h1>
    <p>BICA Coffee & Eatery × Motion Sickness</p>
</div>

<div class="event-info">
    <h2>5K Fun Run with DJ Set Along The Run</h2>
    <p>
        Minggu, 5 Juli 2026<br>
        Start 06.00 WIB<br>
        Start & Finish di BICA Coffee & Eatery<br>
        Kuota Terbatas 50 Peserta
    </p>
</div>

<!-- QUOTA -->

<div class="quota-box">

    <div class="quota-header">
        <span>Participant Slots</span>
        <span id="quotaText">1/50</span>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <p class="quota-note">
        Remaining slots:
        <span id="remainingSlot">49</span>
    </p>

</div>

<!-- FORM -->

<form id="registrationForm">

    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" name="nama" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Nomor WhatsApp</label>
        <input type="tel" name="whatsapp" required>
    </div>

    <div class="form-group">
        <label>Tanggal Lahir</label>
        <input type="date" name="tanggal_lahir" required>
    </div>

    <div class="form-group">
        <label>Jenis Kelamin</label>
        <select name="gender" required>
            <option value="">Pilih</option>
            <option>Pria</option>
            <option>Wanita</option>
        </select>
    </div>

    <div class="form-group">
        <label>Nama Kontak Darurat</label>
        <input type="text" name="kontak_darurat" required>
    </div>

    <div class="form-group">
        <label>Nomor Kontak Darurat</label>
        <input type="tel" name="nomor_darurat" required>
    </div>

    <div class="form-group">
        <label>Catatan Kesehatan (Opsional)</label>
        <textarea
            rows="4"
            name="catatan">
        </textarea>
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" required>
            <span>
                Saya menyatakan dalam kondisi sehat
                dan siap mengikuti DAY BREAK 5K Fun Run.
            </span>
        </label>
    </div>

    <button type="submit" class="btn">
        DAFTAR SEKARANG
    </button>

</form>

<div class="footer">
    Free Registration • Doorprize • Fun Run • DJ Set
</div>

</div>

<script> const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCXLmULNKeFwjHRwnjKmHvs0M0runap2ue5hclnmQ8IFiMvK6_nuRb98zY-klcrFW4/exec"; const MAX_SLOT = 50; document .getElementById("registrationForm") .addEventListener("submit", async function (e) { e.preventDefault(); const formData = { nama: document.querySelector('[name="nama"]').value, email: document.querySelector('[name="email"]').value, whatsapp: document.querySelector('[name="whatsapp"]').value, tanggal_lahir: document.querySelector('[name="tanggal_lahir"]').value, gender: document.querySelector('[name="gender"]').value, kontak_darurat: document.querySelector('[name="kontak_darurat"]').value, nomor_darurat: document.querySelector('[name="nomor_darurat"]').value, catatan: document.querySelector('[name="catatan"]').value }; try { const response = await fetch(
  GOOGLE_SCRIPT_URL,
  {
    method: "POST",
    mode: "cors",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(formData)
  }
); const text = await response.text(); console.log("Response:", text); alert( "Response:\n\n" + text ); } catch (error) { console.error("ERROR:", error); alert( "ERROR:\n\n" + error.toString() ); } }); </script>

</body> </html>
